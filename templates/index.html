<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desha | المحول الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* حاوية الإعلانات عشان تظهر متسنترة وشيك */
        .ad-container {
            width: 100%;
            max-width: 468px;
            min-height: 60px;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .main-card {
            background: linear-gradient(145deg, #0f0f0f, #151515);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .title {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #fcf6ba, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.4));
        }

        .tagline {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .file-input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            color: var(--gold);
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .btn {
            background: linear-gradient(to right, #d4af37, #fcf6ba);
            color: #000;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <div class="ad-container">
        <script type="text/javascript">
            atOptions = {
                'key' : '657a5a1643f4958e4a20c25691b66ba3',
                'format' : 'iframe',
                'height' : 60,
                'width' : 468,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/657a5a1643f4958e4a20c25691b66ba3/invoke.js"></script>
    </div>

    <div class="main-card">
        <h1 class="title">Desha</h1>
        <div class="tagline">PREMIUM CONVERTER</div>
        
        <form action="/convert" method="post" enctype="multipart/form-data">
            <input type="file" name="pdf_file" accept=".pdf" class="file-input" required>
            <button type="submit" class="btn">تحويل الملف الآن ⚡</button>
        </form>
    </div>

    <div class="ad-container">
        <script type="text/javascript">
            atOptions = {
                'key' : '657a5a1643f4958e4a20c25691b66ba3',
                'format' : 'iframe',
                'height' : 60,
                'width' : 468,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/657a5a1643f4958e4a20c25691b66ba3/invoke.js"></script>
    </div>

</body>
</html>
