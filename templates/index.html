<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول ديشا السريع | PDF to Word</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 100%; }
        h1 { color: #d9534f; }
        input[type="file"] { margin: 20px 0; }
        button { background-color: #5cb85c; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 18px; width: 100%; }
        button:hover { background-color: #4cae4c; }
        .ads { background: #eee; height: 100px; margin: 20px 0; line-height: 100px; border: 1px dashed #bbb; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 محول ديشا السريع</h1>
        <p>حول ملفات الـ PDF لـ Word في ثواني مجاناً</p>

        <div class="ads">إعلان هنا (قريباً)</div>

        <form action="/convert" method="POST" enctype="multipart/form-data">
            <input type="file" name="pdf_file" accept=".pdf" required>
            <button type="submit">تحويل وتحميل الآن 📥</button>
        </form>

        <div class="ads">إعلان هنا (قريباً)</div>
    </div>

</body>
  </html>
