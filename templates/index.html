<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desha | محول الملفات الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #030712; /* أسود غامق جداً وشيك */
            background-image: 
                radial-gradient(at 10% 10%, hsla(215, 100%, 60%, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, hsla(185, 100%, 55%, 0.1) 0px, transparent 50%);
            color: #f8fafc;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* أماكن الإعلانات - لون هادي جداً */
        .ad-space {
            width: 90%;
            max-width: 728px;
            height: 90px;
            background: rgba(255, 255, 255, 0.015);
            border: 1px dashed rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 25px 0;
            border-radius: 15px;
            color: #475569;
            font-size: 0.8rem;
        }

        .main-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 50px 40px;
            width: 85%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        /* اسم ديشا بالإنجليزية - شكل رايق وبيلمع */
        .title {
            font-size: 4rem; /* كبير */
            font-weight: 900;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #0ea5e9, #67e8f9); /* تدرج أزرق نيون */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* تأثير اللمعان (Glow) */
            filter: drop-shadow(0 0 15px rgba(14, 165, 233, 0.5));
            letter-spacing: -2px; /* ضغط الحروف للشياكة */
        }

        .tagline {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 40px;
        }

        .input-group {
            margin: 30px 0;
        }

        /* تصميم مدخل الملفات */
        .file-input {
            width: 100%;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 2px dashed rgba(56, 189, 248, 0.2);
            border-radius: 15px;
            color: #e2e8f0;
            cursor: pointer;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .file-input:hover {
            border-color: #0ea5e9;
            background: rgba(14, 165, 233, 0.05);
        }

        /* زرار التحويل النيون */
        .btn {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            color: #030712;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.5);
        }
    </style>
</head>
<body>

    <div class="ad-space">مكان الإعلان العلوي</div>

    <div class="main-card">
        <div class="title">Desha</div>
        <div class="tagline">المحول الذكي.. حول ملفاتك الآن بضغطة زر ⚡</div>
        
        <form action="/convert" method="post" enctype="multipart/form-data">
            <div class="input-group">
                <input type="file" name="pdf_file" accept=".pdf" class="file-input" required>
            </div>
            <button type="submit" class="btn">ابدأ التحويل الآن</button>
        </form>
    </div>

    <div class="ad-space">مكان الإعلان السفلي</div>

</body>
</html>
